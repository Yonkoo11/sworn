<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sworn — Public verifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // SPA fallback restore. 404.html rewrote a deep path to "?p=/<path>";
      // here we restore it via history.replaceState before React boots so
      // BrowserRouter sees the intended URL. Pattern: rafgraph/spa-github-pages
      (function () {
        var l = window.location;
        if (l.search && l.search.indexOf('p=/') >= 0) {
          var q = l.search.slice(1).split('&').reduce(function (acc, kv) {
            var i = kv.indexOf('=');
            acc[kv.slice(0, i)] = kv.slice(i + 1).replace(/~and~/g, '&');
            return acc;
          }, {});
          var restored = (q.p || '') + (q.q ? '?' + q.q : '') + l.hash;
          history.replaceState(null, '', l.pathname.replace(/\/$/, '') + restored);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
