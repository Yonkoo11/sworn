<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sworn — verifier</title>
    <script>
      // SPA fallback for GitHub Pages: a hit to a deep path serves this 404,
      // we rewrite location + sessionStorage redirect so index.html can route.
      // Pattern: github.com/rafgraph/spa-github-pages
      (function () {
        var pathSegmentsToKeep = 1; // "/sworn"
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?p=/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
