# Builds verifier-web (root /) and demo-chatbot (/demo/) static, deploys to
# GitHub Pages at https://yonkoo11.github.io/sworn/. No untrusted GitHub event
# inputs are used, so command injection via github.event.* is not in scope.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_VERIFIER_URL: https://yonkoo11.github.io/sworn
      # Live chain wiring - verifier-web reads from Galileo and renders the
      # real on-chain anchor + 0G Storage blob when these are set.
      VITE_SWORN_RPC_URL: https://evmrpc-testnet.0g.ai
      VITE_SWORN_REGISTRY_ADDRESS: 0xf35bE6FFEBF91AcC27A78696cf912595C6b08AAA
      VITE_SWORN_CHAIN_ID: "16602"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install workspace deps
        run: pnpm install --no-frozen-lockfile
      - name: Build SDK
        run: pnpm --filter '@sworn/sdk' build
      - name: Build verifier-web (root)
        run: pnpm --filter verifier-web build
      - name: Build demo-chatbot (static export under /demo/)
        run: pnpm --filter demo-chatbot build
      - name: Stage _site
        run: |
          mkdir -p _site _site/demo
          cp -r verifier-web/dist/. _site/
          cp -r demo-chatbot/out/. _site/demo/
          ls -la _site _site/demo
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
