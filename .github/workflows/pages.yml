# Deploys verifier-web (static Vite SPA) to GitHub Pages at
# https://yonkoo11.github.io/sworn/. No untrusted GitHub event inputs are used,
# so command injection via github.event.* is not a concern in this workflow.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install workspace deps
        run: pnpm install --no-frozen-lockfile
      - name: Build SDK (verifier-web pulls types from it)
        run: pnpm --filter '@sworn/sdk' build
      - name: Build verifier-web
        run: pnpm --filter verifier-web build
      - name: Stage _site
        run: |
          mkdir -p _site
          cp -r verifier-web/dist/. _site/
          ls _site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
