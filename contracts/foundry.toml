[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"
gas_reports = ["ReceiptRegistry"]
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
galileo = "https://evmrpc-testnet.0g.ai"

[etherscan]
# Galileo block explorer settings (placeholder; verification is manual via Chainscan UI for V1)
